name: Fetch ship and crossing data

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Fetch PortWatch transit data
        run: npm run fetch-portwatch

      - name: Fetch crossing data from Windward
        run: npm run fetch-crossings

      - name: Fetch ship positions from MarineTraffic
        run: npm run fetch-ships

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ship and crossing data"
            git push
          fi
